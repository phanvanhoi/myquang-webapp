{# Bottom nav — Giới thiệu | Đặt món (online) hoặc Gọi món (bàn) | Gọi hotline #}
<nav class="pub-bottom-nav" aria-label="Điều hướng chính">
  <div class="max-w-lg mx-auto flex h-full">
    <a :href="typeof introNavHref !== 'undefined' ? introNavHref : '/gioi-thieu'"
       class="pub-nav-item {{ 'is-active' if activeNav == 'intro' else '' }}">
      <i data-lucide="home" class="w-5 h-5"></i>
      <span>Giới thiệu</span>
    </a>
    <a href="/order"
       :class="(typeof hideOrderNav !== 'undefined' && hideOrderNav) ? 'hidden' : ''"
       class="pub-nav-item {{ 'is-active' if activeNav == 'order' else '' }}">
      <i data-lucide="shopping-bag" class="w-5 h-5"></i>
      <span>Đặt món</span>
    </a>
    <a :href="tableOrderNavHref"
       x-show="typeof tableOrderNavHref === 'string' && tableOrderNavHref"
       x-cloak
       class="pub-nav-item {{ 'is-active' if activeNav == 'table' else '' }}">
      <i data-lucide="qr-code" class="w-5 h-5"></i>
      <span>Gọi món</span>
    </a>
    <a href="tel:{{ publicHotline }}"
       class="pub-nav-item pub-nav-item--call">
      <i data-lucide="phone" class="w-5 h-5"></i>
      <span>Gọi ngay</span>
    </a>
  </div>
</nav>
