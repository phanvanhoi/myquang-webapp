{# Tóm tắt món đã gọi — QR bàn #}
<section x-show="orderSummary" x-cloak class="max-w-3xl mx-auto px-4 -mt-2 relative z-10">
  <div class="pub-card rounded-2xl overflow-hidden">
    <button type="button" @click="summaryOpen = !summaryOpen"
            class="w-full px-4 py-3.5 flex items-center justify-between text-left gap-3">
      <div class="min-w-0">
        <div class="flex items-center gap-2">
          <span class="pub-section-label">Đã gọi</span>
          <span class="text-[11px] px-2 py-0.5 rounded-full bg-amber-100 text-[#8a6502] font-bold"
                x-text="(orderSummary ? orderSummary.item_count : 0) + ' món'"></span>
        </div>
        <p class="text-lg font-extrabold text-[#c2410c] mt-1 tabular-nums"
           x-text="orderSummary ? fmt(orderSummary.final_amount != null ? orderSummary.final_amount : orderSummary.total_amount) : ''"></p>
        <p x-show="orderSummary && orderSummary.discount_amount > 0"
           class="text-xs text-[#5c4a1a]/50 mt-0.5">
          Trước giảm: <span x-text="orderSummary ? fmt(orderSummary.total_amount) : ''"></span>
        </p>
      </div>
      <div class="shrink-0 flex items-center gap-1 text-xs text-[#8a6502]/60 font-medium">
        <span x-text="summaryOpen ? 'Thu gọn' : 'Chi tiết'"></span>
        <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-200"
           :class="summaryOpen ? 'rotate-180' : ''"></i>
      </div>
    </button>

    <div x-show="summaryOpen" class="border-t border-amber-100/80 max-h-72 overflow-y-auto">
      <template x-for="(row, idx) in (orderSummary ? orderSummary.items : [])" :key="idx">
        <div class="px-4 py-3 flex items-start justify-between gap-3 border-b border-amber-50 last:border-0">
          <div class="min-w-0">
            <p class="font-semibold text-sm text-[#5c4a1a] leading-snug"
               x-text="row.quantity + '× ' + row.item_name"></p>
            <p x-show="row.note" class="text-xs text-[#5c4a1a]/50 mt-0.5 truncate" x-text="row.note"></p>
          </div>
          <div class="text-right shrink-0 space-y-1">
            <p class="font-bold text-sm text-[#c2410c] tabular-nums" x-text="fmt(row.subtotal)"></p>
            <span class="pub-item-status"
                  :class="{
                    'pub-item-status--pending': row.status === 'pending',
                    'pub-item-status--preparing': row.status === 'preparing',
                    'pub-item-status--served': row.status === 'served',
                    'pub-item-status--cancelled': row.status === 'cancelled',
                  }"
                  x-text="statusLabel(row.status)"></span>
          </div>
        </div>
      </template>
    </div>
  </div>
</section>
