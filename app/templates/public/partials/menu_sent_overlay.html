{# Overlay sau khi gửi món QR bàn #}
<div x-show="showSentOverlay" x-cloak
     class="pub-sent-overlay fixed inset-0 z-[60] flex items-center justify-center p-6">
  <div class="max-w-sm w-full text-center">
    <div class="pub-sent-check mx-auto w-20 h-20 rounded-full bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center shadow-xl shadow-emerald-200/60 mb-6">
      <i data-lucide="check" class="w-10 h-10 text-white stroke-[3]"></i>
    </div>
    <h2 class="font-display font-bold text-3xl text-[#8a6502] leading-tight">
      Đơn của bạn đã được<br>gửi xuống bếp!
    </h2>
    <p class="mt-3 text-sm text-[#5c4a1a]/85 leading-relaxed">
      Bếp đang chế biến món cho <span class="font-bold text-[#c2410c]" x-text="tableName"></span>.
    </p>
    <div class="mt-6 inline-flex items-center gap-2 px-4 py-2.5 rounded-full bg-white/80 border border-amber-200/60 text-sm text-[#8a6502] font-medium">
      <span class="inline-block w-4 h-4 border-2 border-amber-500 border-t-transparent rounded-full animate-spin"></span>
      <span>Chuyển trang sau <span class="font-bold tabular-nums" x-text="redirectSec"></span>s…</span>
    </div>
  </div>
</div>
