<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f59e0b" />
  <title>{% block title %}{{ settings.restaurant_name or 'MyQuang' }}{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',
                     400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',
                     800:'#92400e',900:'#78350f' }
          },
          fontFamily: { sans: ['"Be Vietnam Pro"','sans-serif'] }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    [x-cloak]{display:none!important}
    .toast{animation:slideIn .3s ease,fadeOut .5s ease 2.5s forwards}
    @keyframes slideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeOut{from{opacity:1}to{opacity:0;pointer-events:none}}
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  {% block head %}{% endblock %}
</head>

<body class="bg-amber-50 font-sans text-gray-800 min-h-screen">
{% block content %}{% endblock %}

<script>
  lucide.createIcons();
  document.addEventListener('alpine:initialized', () => lucide.createIcons());
</script>
{% block scripts %}{% endblock %}
</body>
</html>
