services:
  myquang:
    build: .
    container_name: myquang-app
    network_mode: host
    volumes:
      - myquang_data:/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/data/myquang.db
      - TZ=Asia/Ho_Chi_Minh
      # Bắt buộc: tạo file .env cạnh docker-compose.yml (xem .env.example)
      - SECRET_KEY=${SECRET_KEY}

volumes:
  myquang_data:
